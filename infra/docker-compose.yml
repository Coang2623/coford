# Hạ tầng: PostgreSQL + Adminer (Phase 1) + Redis (Phase 3)
# Chạy:  docker compose -f infra/docker-compose.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: coford-postgres
    environment:
      POSTGRES_DB: coford
      POSTGRES_USER: coford
      POSTGRES_PASSWORD: coford
    ports:
      - "5432:5432"
    volumes:
      - coford-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coford"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:4
    container_name: coford-adminer
    ports:
      - "8090:8080"
    depends_on:
      - postgres

  # Redis: distributed cache + lưu idempotency key (Phase 3)
  redis:
    image: redis:7-alpine
    container_name: coford-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Kafka (KRaft, 1 node) — message broker cho event đơn hàng (Phase 4)
  kafka:
    image: apache/kafka:3.8.0
    container_name: coford-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # Keycloak (Phase 5): xác thực & phân quyền nhân viên. Admin: admin/admin tại :8081
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: coford-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/coford-realm.json:/opt/keycloak/data/import/coford-realm.json:ro

  # Prometheus (Phase 6): thu thập metrics từ backend (/actuator/prometheus)
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: coford-prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Grafana (Phase 6): dashboard metrics. Đăng nhập admin/admin tại :3000
  grafana:
    image: grafana/grafana:11.3.0
    container_name: coford-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  coford-pgdata:
