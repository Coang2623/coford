server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: moi route deu tra ve index.html (React Router xu ly client-side)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE cho man Bep: KHONG buffer, giu ket noi lau -> dat truoc /api chung
    location /api/kitchen/stream {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    # Proxy API sang backend Spring Boot (cung mang docker)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
