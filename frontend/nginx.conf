# HTTP -> chuyen huong sang HTTPS (Keycloak/keycloak-js can secure context)
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Keycloak chung 1 origin voi app qua /kc -> khong con cross-origin cookie/CORS.
    # KC chay voi KC_HTTP_RELATIVE_PATH=/kc nen giu nguyen prefix khi proxy.
    location /kc/ {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }

    # SSE cho man Bep: KHONG buffer, giu ket noi lau -> dat truoc /api chung
    location /api/kitchen/stream {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    # Proxy API sang backend Spring Boot (cung mang docker)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # SPA: moi route deu tra ve index.html (React Router xu ly client-side)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
